<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C. Sree Harshith Reddy — Portfolio</title>

  <!--
  ============================================================
    STAGE 02 — 3D Building Assembly Animation
    git commit: "feat: 3D building blocks assemble on scroll with sliding doors"
  ============================================================
    CHANGES FROM STAGE 01:
      + CSS 3D perspective scene wrapper (.scene-3d)
      + 10 building blocks (.blk) each with a unique
        random entry direction via CSS custom properties:
          --tx  translateX  (side entries)
          --ty  translateY  (top/bottom entries)
          --tz  translateZ  (front/back entries)
          --rx  rotateX     (perspective tilt)
          --ry  rotateY     (side spin)
      + Each .blk transitions to identity when .vis added by JS
      + Window grids (.win) with l1/l2/l3 lit states
      + Window flicker setInterval
      + Wings row with individual left/right slide-in
      + Sliding doors (.door-panel.left / .right) split at progress 0.82
      + "WELCOME" text glows in the door gap
      + Ground glow pool beneath entrance
      + Penthouse name: "C. SREE HARSHITH REDDY'S EMPIRE"
      + Antenna blink tip light
      - placeholder-hint div REMOVED

    Everything from Stage 01 is unchanged.
  ============================================================
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    /* =====================================================
       DESIGN TOKENS — unchanged from Stage 01
    ===================================================== */
    :root {
      --bg:           #07060e;
      --accent:       #7c3aed;
      --gold:         #f59e0b;
      --cyan:         #06b6d4;
      --text:         #e8e4f0;
      --muted:        rgba(232, 228, 240, 0.42);
      --glass:        rgba(124, 58, 237, 0.06);
      --border:       rgba(124, 58, 237, 0.22);
      --font-display: 'Bebas Neue', sans-serif;
      --font-mono:    'Space Mono', monospace;
      --font-body:    'DM Sans', sans-serif;
    }

    /* =====================================================
       RESET + BASE — unchanged
    ===================================================== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow-x: hidden;
    }

    /* =====================================================
       SCROLL SCENE — unchanged
    ===================================================== */
    #scene { height: 600vh; position: relative; }
    .sticky {
      position: sticky; top: 0; height: 100vh;
      overflow: hidden;
      display: flex; align-items: flex-end; justify-content: center;
    }

    /* =====================================================
       SKY — unchanged
    ===================================================== */
    .sky {
      position: absolute; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 0%, rgba(44,16,82,.85) 0%, transparent 70%),
        linear-gradient(180deg, #0d0720 0%, #09061a 40%, #07060e 75%, #07060e 100%);
    }

    /* =====================================================
       STARS — unchanged
    ===================================================== */
    .stars-wrap { position: absolute; inset: 0; z-index: 1; overflow: hidden; height: 70%; pointer-events: none; }
    .star {
      position: absolute; border-radius: 50%; background: rgba(255,255,255,.82);
      animation: twinkle var(--d,3s) ease-in-out infinite; animation-delay: var(--dl,0s);
    }
    @keyframes twinkle {
      0%,100% { opacity:.12; transform:scale(.85); }
      50%      { opacity:.95; transform:scale(1.1); }
    }

    /* =====================================================
       CITY SILHOUETTE — unchanged
    ===================================================== */
    .city-bg {
      position: absolute; bottom: 108px; left: 0; right: 0; z-index: 2; height: 170px;
      display: flex; align-items: flex-end; justify-content: center; gap: 3px;
      opacity: .24; pointer-events: none;
    }
    .cb { flex-shrink: 0; background: linear-gradient(180deg, #1a183a, #0d0b1a); border-top: 1px solid rgba(124,58,237,.18); }

    /* =====================================================
       GROUND — unchanged
    ===================================================== */
    .ground {
      position: absolute; bottom: 0; left: 0; right: 0; height: 108px; z-index: 12;
      background: linear-gradient(180deg, #141228, #0a0916);
      border-top: 1px solid rgba(124,58,237,.12);
    }
    .road {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 160px; height: 108px; background: #0f0e1c;
      border-left: 1px solid rgba(124,58,237,.10); border-right: 1px solid rgba(124,58,237,.10);
    }
    .road-dashes { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 9px; }
    .rd { width: 5px; height: 16px; background: rgba(245,158,11,.32); border-radius: 1px; }
    .pavement { position: absolute; bottom: 0; height: 108px; width: calc(50% - 80px); background: linear-gradient(180deg, #111028, #09080f); }
    .pavement.left  { left: 0; }
    .pavement.right { right: 0; }

    /* =====================================================
       SCROLL HUD — unchanged
    ===================================================== */
    .scroll-hud {
      position: absolute; top: 28px; right: 32px; z-index: 50;
      display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
      opacity: 0; transition: opacity .4s; pointer-events: none;
    }
    .scroll-hud.visible { opacity: 1; }
    .hud-label { font-family: var(--font-mono); font-size: .58rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }
    .hud-value { font-family: var(--font-display); font-size: 2rem; letter-spacing: 3px; color: var(--gold); line-height: 1; }
    .hud-bar   { width: 80px; height: 2px; background: rgba(245,158,11,.15); position: relative; overflow: hidden; }
    .hud-bar-fill { position: absolute; left: 0; top: 0; bottom: 0; width: 0%; background: var(--gold); transition: width .1s linear; }

    /* =====================================================
       SCROLL HINT — unchanged
    ===================================================== */
    .scroll-hint {
      position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%);
      z-index: 30; display: flex; flex-direction: column; align-items: center; gap: 8px;
      opacity: 1; transition: opacity .6s ease; pointer-events: none;
    }
    .scroll-hint.hide { opacity: 0; }
    .sh-label  { font-family: var(--font-mono); font-size: .58rem; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; }
    .sh-arrow  { width: 1px; height: 36px; background: linear-gradient(180deg, transparent, var(--accent)); animation: pulse-line 1.6s ease-in-out infinite; }
    @keyframes pulse-line { 0%,100%{opacity:.25;transform:scaleY(.75);} 50%{opacity:1;transform:scaleY(1);} }
    .sh-chevron { width:10px;height:10px;border-right:1.5px solid var(--accent);border-bottom:1.5px solid var(--accent);transform:rotate(45deg) translateY(-4px);animation:bounce-chevron 1.6s ease-in-out infinite; }
    @keyframes bounce-chevron { 0%,100%{transform:rotate(45deg) translateY(-4px);opacity:.4;} 50%{transform:rotate(45deg) translateY(2px);opacity:1;} }

    /* =====================================================
       ★ NEW — STAGE 02: CSS 3D SCENE
    ===================================================== */

    /*
      The outer wrapper holds the CSS perspective so that
      all child 3D transforms are rendered correctly.
      perspective-origin 50% 120% puts the vanishing point
      slightly below the viewport bottom, which makes the
      building appear to recede naturally.
    */
    .scene-3d {
      position: absolute;
      bottom: 108px;
      left: 50%;
      transform: translateX(-50%);
      width: 380px;
      height: 540px;
      perspective: 900px;
      perspective-origin: 50% 120%;
      z-index: 8;
    }

    /*
      .building is what JS scales on every scroll frame.
      transform-style: preserve-3d passes the perspective
      through to all .blk children.
    */
    .building {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%) scale(0.28);
      transform-origin: bottom center;
      transform-style: preserve-3d;
      width: 340px;
    }

    /*
      Each .blk starts at its "launch" position defined
      by inline CSS custom properties (--tx, --ty, etc.).
      When JS adds .vis the block eases back to identity.
    */
    .blk {
      position: relative;
      width: 100%;
      opacity: 0;
      transform:
        translateX(var(--tx,0px))
        translateY(var(--ty,0px))
        translateZ(var(--tz,0px))
        rotateX(var(--rx,0deg))
        rotateY(var(--ry,0deg));
      transition:
        opacity   0.95s cubic-bezier(0.22,1,0.36,1),
        transform 0.95s cubic-bezier(0.22,1,0.36,1);
    }
    .blk.vis {
      opacity: 1;
      transform: translateX(0) translateY(0) translateZ(0) rotateX(0deg) rotateY(0deg);
    }

    /* ── Antenna ── */
    .b-antenna {
      width: 3px; height: 32px; margin: 0 auto;
      background: linear-gradient(180deg, rgba(245,158,11,.9), rgba(124,58,237,.3));
      position: relative;
    }
    .b-antenna::after {
      content: ''; position: absolute; top: -5px; left: 50%; transform: translateX(-50%);
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--gold); box-shadow: 0 0 18px 6px rgba(245,158,11,.8);
      animation: blink-tip 1.5s ease-in-out infinite;
    }
    @keyframes blink-tip {
      0%,100% { opacity:1;  box-shadow:0 0 18px 6px rgba(245,158,11,.8); }
      50%      { opacity:.1; box-shadow:0 0 4px  1px rgba(245,158,11,.2); }
    }

    /* ── Roof triangle ── */
    .b-roof-tri {
      height: 0; width: 0; margin: 0 auto;
      border-left: 90px solid transparent;
      border-right: 90px solid transparent;
      border-bottom: 38px solid #1e1c42;
      position: relative;
    }
    .b-roof-tri::after {
      content: ''; position: absolute; bottom: -38px; left: -90px; right: -90px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--gold), var(--accent), transparent);
      opacity: .75;
    }

    /* ── Penthouse band ── */
    .b-penthouse {
      height: 50px; width: 216px; margin: 0 auto;
      background: linear-gradient(180deg, #1c1a3e, #141230);
      border-top: 2px solid var(--accent);
      border-left: 1px solid rgba(124,58,237,.3);
      border-right: 1px solid rgba(124,58,237,.3);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .b-penthouse::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(124,58,237,.05) 3px, rgba(124,58,237,.05) 4px);
    }
    .b-penthouse-name {
      font-family: var(--font-display);
      font-size: .68rem; letter-spacing: 2.5px; line-height: 1.3;
      color: var(--gold); text-shadow: 0 0 14px rgba(245,158,11,.6);
      text-align: center; z-index: 1; position: relative;
    }

    /* ── Floor slab ── */
    .b-floor {
      height: 60px; width: 100%;
      background: linear-gradient(180deg, #111028, #0d0c22);
      border: 1px solid rgba(124,58,237,.14);
      border-bottom: none;
      display: grid; grid-template-columns: repeat(8,1fr); gap: 4px; padding: 8px 10px;
      position: relative;
    }
    .b-floor::before {
      content: attr(data-label);
      position: absolute; left: -38px; top: 50%; transform: translateY(-50%);
      font-family: var(--font-mono); font-size: .36rem; letter-spacing: 2px;
      color: rgba(124,58,237,.32);
      writing-mode: vertical-rl; rotate: 180deg;
    }

    /* ── Wings row ── */
    .b-wings { display: flex; gap: 4px; width: 100%; }
    .b-wing {
      flex: 1; height: 54px;
      background: linear-gradient(180deg, #0f0e24, #0b0a1a);
      border: 1px solid rgba(124,58,237,.12); border-bottom: none;
      display: grid; grid-template-columns: repeat(4,1fr); gap: 3px; padding: 6px;
    }
    .b-wing-center {
      width: 216px; height: 54px;
      background: linear-gradient(180deg, #111028, #0d0c22);
      border: 1px solid rgba(124,58,237,.18); border-bottom: none;
      display: grid; grid-template-columns: repeat(5,1fr); gap: 3px; padding: 6px;
    }

    /* ── Window cells ── */
    .win {
      background: rgba(124,58,237,.06);
      border: 1px solid rgba(124,58,237,.16);
      border-radius: 1px;
      transition: background .4s, border-color .4s, opacity .15s;
    }
    .win.l1 { background:rgba(245,158,11,.30); border-color:rgba(245,158,11,.55); box-shadow:0 0 5px 1px rgba(245,158,11,.15) inset; }
    .win.l2 { background:rgba(124,58,237,.38); border-color:var(--accent);         box-shadow:0 0 5px 1px rgba(124,58,237,.22) inset; }
    .win.l3 { background:rgba(6,182,212,.28);  border-color:var(--cyan);           box-shadow:0 0 5px 1px rgba(6,182,212,.18)   inset; }

    /* ── Lobby ── */
    .b-lobby {
      height: 78px; width: 100%;
      background: linear-gradient(180deg, #0d0c22, #07060e);
      border: 1px solid rgba(124,58,237,.28); border-top: none;
      display: flex; align-items: flex-end; justify-content: center;
      position: relative; overflow: hidden;
    }
    .b-lobby::before {
      content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 130px; height: 30px;
      background: radial-gradient(ellipse at 50% 100%, rgba(124,58,237,.4), transparent 70%);
    }

    /* ── Door panels ── */
    .door-wrap {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 124px; height: 74px; display: flex; overflow: hidden;
    }
    .door-panel {
      flex: 1; height: 100%;
      background: linear-gradient(180deg, rgba(124,58,237,.22), rgba(124,58,237,.06));
      border-top: 1px solid rgba(124,58,237,.5);
      position: relative;
      transition: transform .85s cubic-bezier(0.22,1,0.36,1);
    }
    .door-panel.left  { border-right: 1px solid rgba(124,58,237,.3); }
    .door-panel.right { border-left:  1px solid rgba(124,58,237,.3); }
    .door-panel.left::after,
    .door-panel.right::after {
      content: ''; position: absolute; top: 50%;
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--gold); box-shadow: 0 0 8px 2px rgba(245,158,11,.6);
      transform: translateY(-50%);
    }
    .door-panel.left::after  { right: 5px; }
    .door-panel.right::after { left: 5px;  }
    .door-panel.left.open    { transform: translateX(-100%); }
    .door-panel.right.open   { transform: translateX(100%);  }

    /* ── Welcome text ── */
    .welcome-text {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 124px; height: 74px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: .85rem; letter-spacing: 5px;
      color: var(--gold);
      text-shadow: 0 0 22px rgba(245,158,11,.9), 0 0 8px rgba(245,158,11,.5);
      opacity: 0; transition: opacity .7s ease .35s; pointer-events: none;
    }
    .welcome-text.show { opacity: 1; }

    /* Ground glow inside lobby */
    .ground-glow {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 140px; height: 20px;
      background: radial-gradient(ellipse at 50% 100%, rgba(124,58,237,.5), transparent 70%);
      opacity: 0; transition: opacity .8s ease; pointer-events: none;
    }
    .ground-glow.show { opacity: 1; }

    /* Street-level glow below entrance */
    .entrance-glow {
      position: absolute; bottom: 108px; left: 50%; transform: translateX(-50%);
      z-index: 13; width: 110px; height: 18px;
      background: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,.55), transparent 70%);
      opacity: 0; transition: opacity .5s ease; pointer-events: none;
    }

    /* ── Entrance sill (block 9) ── */
    .b-sill {
      height: 8px; width: 148px; margin: 0 auto;
      background: linear-gradient(90deg,
        rgba(124,58,237,0),
        rgba(124,58,237,.45),
        rgba(245,158,11,.45),
        rgba(124,58,237,.45),
        rgba(124,58,237,0));
      box-shadow: 0 0 14px 3px rgba(124,58,237,.3);
    }

  </style>
</head>
<body>

  <div id="scene">
    <div class="sticky" id="sticky">

      <div class="sky" id="sky"></div>
      <div class="stars-wrap" id="starsWrap"></div>
      <div class="city-bg" id="cityBg"></div>

      <!-- ============================================================
           ★ NEW — 3D BUILDING
           10 blocks ordered top → bottom in DOM.
           Each starts displaced from a different direction
           and eases to identity when JS adds .vis.

             blk0 antenna       from FRONT   tz:-500
             blk1 roof          from TOP     ty:-320
             blk2 penthouse     from BACK    tz:+500
             blk3 floor 4       from LEFT    tx:-420 ry:-28deg
             blk4 floor 3       from RIGHT   tx:+420 ry:+28deg
             blk5 floor 2       from FRONT   tz:-440 rx:22deg
             blk6 wings         combined     (children split separately)
             blk7 floor 1       from BACK    tz:+460 rx:-20deg
             blk8 lobby         from BELOW   ty:+220
             blk9 entrance sill from FRONT   tz:-300
      ============================================================ -->
      <div class="scene-3d" id="scene3d">
        <div class="building" id="building">

          <div class="blk" id="blk0" style="--tx:0px;--ty:0px;--tz:-500px;--rx:0deg;--ry:0deg;">
            <div class="b-antenna"></div>
          </div>

          <div class="blk" id="blk1" style="--tx:0px;--ty:-320px;--tz:0px;--rx:0deg;--ry:0deg;">
            <div class="b-roof-tri"></div>
          </div>

          <div class="blk" id="blk2" style="--tx:0px;--ty:0px;--tz:500px;--rx:0deg;--ry:0deg;">
            <div class="b-penthouse">
              <div class="b-penthouse-name">C. SREE HARSHITH REDDY'S<br>EMPIRE</div>
            </div>
          </div>

          <div class="blk" id="blk3" style="--tx:-420px;--ty:0px;--tz:0px;--rx:0deg;--ry:-28deg;">
            <div class="b-floor" data-label="FLOOR 04">
              <div class="win l2"></div><div class="win"></div><div class="win l1"></div><div class="win l2"></div>
              <div class="win"></div><div class="win l1"></div><div class="win"></div><div class="win l2"></div>
            </div>
          </div>

          <div class="blk" id="blk4" style="--tx:420px;--ty:0px;--tz:0px;--rx:0deg;--ry:28deg;">
            <div class="b-floor" data-label="FLOOR 03">
              <div class="win"></div><div class="win l1"></div><div class="win l3"></div><div class="win l1"></div>
              <div class="win l2"></div><div class="win"></div><div class="win l1"></div><div class="win"></div>
            </div>
          </div>

          <div class="blk" id="blk5" style="--tx:0px;--ty:0px;--tz:-440px;--rx:22deg;--ry:0deg;">
            <div class="b-floor" data-label="FLOOR 02">
              <div class="win l1"></div><div class="win l2"></div><div class="win"></div><div class="win l1"></div>
              <div class="win"></div><div class="win l3"></div><div class="win l2"></div><div class="win l1"></div>
            </div>
          </div>

          <div class="blk" id="blk6" style="--tx:0px;--ty:0px;--tz:0px;--rx:0deg;--ry:0deg;">
            <div class="b-wings">
              <div class="b-wing" id="wingL">
                <div class="win"></div><div class="win l1"></div><div class="win l2"></div><div class="win"></div>
                <div class="win l1"></div><div class="win"></div><div class="win l2"></div><div class="win l1"></div>
              </div>
              <div class="b-wing-center">
                <div class="win l2"></div><div class="win l1"></div><div class="win"></div><div class="win l1"></div><div class="win l3"></div>
                <div class="win"></div><div class="win l2"></div><div class="win l1"></div><div class="win"></div><div class="win l2"></div>
              </div>
              <div class="b-wing" id="wingR">
                <div class="win l2"></div><div class="win"></div><div class="win l1"></div><div class="win l2"></div>
                <div class="win l1"></div><div class="win l3"></div><div class="win"></div><div class="win l1"></div>
              </div>
            </div>
          </div>

          <div class="blk" id="blk7" style="--tx:0px;--ty:0px;--tz:460px;--rx:-20deg;--ry:0deg;">
            <div class="b-floor" data-label="FLOOR 01">
              <div class="win l1"></div><div class="win"></div><div class="win l2"></div><div class="win l1"></div>
              <div class="win l3"></div><div class="win l1"></div><div class="win"></div><div class="win l2"></div>
            </div>
          </div>

          <div class="blk" id="blk8" style="--tx:0px;--ty:220px;--tz:0px;--rx:0deg;--ry:0deg;">
            <div class="b-lobby">
              <div class="ground-glow" id="groundGlow"></div>
              <div class="door-wrap">
                <div class="door-panel left"  id="doorL"></div>
                <div class="door-panel right" id="doorR"></div>
                <div class="welcome-text" id="welcomeText">WELCOME</div>
              </div>
            </div>
          </div>

          <div class="blk" id="blk9" style="--tx:0px;--ty:0px;--tz:-300px;--rx:0deg;--ry:0deg;">
            <div class="b-sill"></div>
          </div>

        </div><!-- /.building -->
      </div><!-- /.scene-3d -->

      <!-- Street glow below entrance -->
      <div class="entrance-glow" id="entranceGlow"></div>

      <div class="ground">
        <div class="pavement left"></div>
        <div class="road">
          <div class="road-dashes" id="roadDashes"></div>
        </div>
        <div class="pavement right"></div>
      </div>

      <div class="scroll-hud" id="scrollHud">
        <span class="hud-label">Scroll</span>
        <span class="hud-value" id="hudValue">0%</span>
        <div class="hud-bar"><div class="hud-bar-fill" id="hudFill"></div></div>
      </div>

      <div class="scroll-hint" id="scrollHint">
        <span class="sh-label">Scroll to enter</span>
        <div class="sh-arrow"></div>
        <div class="sh-chevron"></div>
      </div>

    </div>
  </div>


  <script>
    /* ==============================================================
       STAGE 02 JavaScript
       Stage 01 functions unchanged. New code marked ★ NEW.
    ============================================================== */

    function generateStars(count = 180) {
      const wrap = document.getElementById('starsWrap');
      const frag = document.createDocumentFragment();
      for (let i = 0; i < count; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 2 + 0.8;
        const x    = Math.random() * 100;
        const y    = Math.random() * 100;
        const dur  = (Math.random() * 3 + 2).toFixed(1);
        const del  = (Math.random() * 4).toFixed(1);
        s.style.cssText = `width:${size}px;height:${size}px;left:${x}%;top:${y}%;--d:${dur}s;--dl:${del}s;`;
        frag.appendChild(s);
      }
      wrap.appendChild(frag);
    }

    function generateCityBg() {
      const c = document.getElementById('cityBg');
      const f = document.createDocumentFragment();
      [[18,60],[28,95],[22,75],[35,130],[20,55],[30,110],[18,65],[42,155],
       [25,80],[30,100],[20,70],[36,125],[24,85],[28,95],[18,50],[40,140],
       [22,70],[26,90],[32,115],[20,60],[28,95],[18,55],[34,120],[22,75]]
      .forEach(([w,h]) => {
        const el = document.createElement('div');
        el.className = 'cb';
        el.style.cssText = `width:${w}px;height:${h}px;`;
        f.appendChild(el);
      });
      c.appendChild(f);
    }

    function generateRoadDashes(n = 5) {
      const c = document.getElementById('roadDashes');
      for (let i = 0; i < n; i++) {
        const d = document.createElement('div'); d.className = 'rd'; c.appendChild(d);
      }
    }

    /* ── DOM refs ── */
    const scene      = document.getElementById('scene');
    const cityBg     = document.getElementById('cityBg');
    const scrollHud  = document.getElementById('scrollHud');
    const hudValue   = document.getElementById('hudValue');
    const hudFill    = document.getElementById('hudFill');
    const scrollHint = document.getElementById('scrollHint');

    /* ★ NEW refs */
    const building     = document.getElementById('building');
    const doorL        = document.getElementById('doorL');
    const doorR        = document.getElementById('doorR');
    const welcomeText  = document.getElementById('welcomeText');
    const groundGlow   = document.getElementById('groundGlow');
    const entranceGlow = document.getElementById('entranceGlow');
    const blocks       = Array.from({length:10},(_,i) => document.getElementById(`blk${i}`));

    /*
      ★ NEW — scroll thresholds per block (progress fraction 0–1).
      Building assembles bottom-up: lobby first, antenna last.
      All blocks visible by ~0.40, leaving 0.40–0.82 for the
      character zoom (Stage 03), then 0.82+ triggers doors.
    */
    const THRESHOLDS = [
      0.38, // blk0 antenna
      0.34, // blk1 roof
      0.30, // blk2 penthouse
      0.25, // blk3 floor 4
      0.22, // blk4 floor 3
      0.18, // blk5 floor 2
      0.15, // blk6 wings
      0.12, // blk7 floor 1
      0.07, // blk8 lobby
      0.04, // blk9 entrance sill
    ];

    /* stagger delay in ms per block */
    const DELAYS = [0, 40, 70, 55, 55, 70, 35, 70, 15, 0];

    let doorsOpen = false;

    function onScroll() {
      const sceneTop = scene.offsetTop;
      const progress = Math.max(0, Math.min(1,
        (window.scrollY - sceneTop) / (scene.offsetHeight - window.innerHeight)
      ));

      /* HUD */
      scrollHud.classList.toggle('visible', progress > 0.005);
      const pct = Math.round(progress * 100);
      hudValue.textContent = `${pct}%`;
      hudFill.style.width  = `${pct}%`;

      /* scroll hint */
      scrollHint.classList.toggle('hide', progress > 0.03);

      /* city silhouette */
      cityBg.style.opacity = Math.max(0, 0.24 - progress * 0.55).toFixed(3);

      /* sky bloom */
      const b = Math.min(progress * 1.4, 1);
      document.getElementById('sky').style.background = `
        radial-gradient(ellipse 70% ${55+b*20}% at 50% 0%,rgba(44,16,82,${(.85+b*.15).toFixed(2)}) 0%,transparent 70%),
        linear-gradient(180deg,#0d0720 0%,#09061a 40%,#07060e 100%)`;

      /* ★ NEW — reveal blocks */
      blocks.forEach((blk, i) => {
        if (progress >= THRESHOLDS[i]) {
          if (!blk.classList.contains('vis')) {
            setTimeout(() => blk.classList.add('vis'), DELAYS[i]);
          }
        } else {
          blk.classList.remove('vis');
        }
      });

      /* ★ NEW — building scale zoom (smoothstep 0.28 → 1.25) */
      const zp    = Math.min(progress / 0.82, 1);
      const eased = zp * zp * (3 - 2 * zp);
      building.style.transform = `translateX(-50%) scale(${(0.28 + eased * 0.97).toFixed(4)})`;

      /* ★ NEW — entrance glow fades in from progress 0.38 */
      const ga = Math.max(0, Math.min(1, (progress - 0.38) / 0.3));
      entranceGlow.style.opacity = ga.toFixed(3);

      /* ★ NEW — sliding doors */
      if (progress >= 0.82 && !doorsOpen) {
        doorsOpen = true;
        doorL.classList.add('open');
        doorR.classList.add('open');
        groundGlow.classList.add('show');
        welcomeText.classList.add('show');
      } else if (progress < 0.78 && doorsOpen) {
        doorsOpen = false;
        doorL.classList.remove('open');
        doorR.classList.remove('open');
        groundGlow.classList.remove('show');
        welcomeText.classList.remove('show');
      }

      /* Stage 03 slot → character walk */
      /* Stage 04 slot → entry flash  */
    }

    /* ★ NEW — window flicker */
    function startWindowFlicker() {
      setInterval(() => {
        document.querySelectorAll('.win.l1,.win.l2,.win.l3').forEach(w => {
          if (Math.random() > 0.91) {
            w.style.opacity = '0.22';
            setTimeout(() => { w.style.opacity = ''; }, 100 + Math.random() * 200);
          }
        });
      }, 850);
    }

    /* ★ NEW — wing split: wings slide in from sides independently */
    function initWingSplit() {
      const wL = document.getElementById('wingL');
      const wR = document.getElementById('wingR');
      wL.style.cssText += 'transform:translateX(-55px);transition:transform 1.1s cubic-bezier(0.22,1,0.36,1);';
      wR.style.cssText += 'transform:translateX(55px); transition:transform 1.1s cubic-bezier(0.22,1,0.36,1);';

      new MutationObserver(() => {
        const on = document.getElementById('blk6').classList.contains('vis');
        wL.style.transform = on ? 'translateX(0)' : 'translateX(-55px)';
        wR.style.transform = on ? 'translateX(0)' : 'translateX(55px)';
      }).observe(document.getElementById('blk6'), { attributes:true, attributeFilter:['class'] });
    }

    function init() {
      generateStars(180);
      generateCityBg();
      generateRoadDashes(5);
      initWingSplit();
      window.addEventListener('scroll', onScroll, { passive:true });
      onScroll();
      startWindowFlicker();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>

</body>
