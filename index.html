<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C. Sree Harshith Reddy — Portfolio</title>

  <!--
  ============================================================
    STAGE 03 — Character Walk & Perspective Zoom
    git commit: "feat: character walks toward building on scroll"
  ============================================================
    CHANGES FROM STAGE 02:
      + #character  — pixel person sitting on road
      + .char-head, .char-body, .char-legs, .char-shadow
      + @keyframes walk-left / walk-right  leg swing
      + @keyframes char-bob               body bounce while walking
      + JS: character moves from left edge → door centre
            as scroll progress goes 0.04 → 0.82
      + JS: walking animation toggles based on scroll movement
      + JS: character scales up as it approaches building
            (parallels building zoom for depth illusion)
      + JS: character fades + shrinks into doors at progress > 0.82
      + JS: character shadow stretches proportionally
      + JS: footstep dust puffs appear while walking (canvas)
      + Briefcase accessory on character body

    Everything from Stage 01 and Stage 02 is unchanged.
  ============================================================
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    /* =====================================================
       DESIGN TOKENS — unchanged
    ===================================================== */
    :root {
      --bg:           #07060e;
      --accent:       #7c3aed;
      --gold:         #f59e0b;
      --cyan:         #06b6d4;
      --text:         #e8e4f0;
      --muted:        rgba(232, 228, 240, 0.42);
      --glass:        rgba(124, 58, 237, 0.06);
      --border:       rgba(124, 58, 237, 0.22);
      --font-display: 'Bebas Neue', sans-serif;
      --font-mono:    'Space Mono', monospace;
      --font-body:    'DM Sans', sans-serif;
    }

    /* =====================================================
       RESET + BASE — unchanged
    ===================================================== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow-x: hidden;
    }

    /* =====================================================
       SCROLL SCENE — unchanged
    ===================================================== */
    #scene { height: 600vh; position: relative; }
    .sticky {
      position: sticky; top: 0; height: 100vh;
      overflow: hidden;
      display: flex; align-items: flex-end; justify-content: center;
    }

    /* =====================================================
       SKY — unchanged
    ===================================================== */
    .sky {
      position: absolute; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 0%, rgba(44,16,82,.85) 0%, transparent 70%),
        linear-gradient(180deg, #0d0720 0%, #09061a 40%, #07060e 75%, #07060e 100%);
    }

    /* =====================================================
       STARS — unchanged
    ===================================================== */
    .stars-wrap { position: absolute; inset: 0; z-index: 1; overflow: hidden; height: 70%; pointer-events: none; }
    .star {
      position: absolute; border-radius: 50%; background: rgba(255,255,255,.82);
      animation: twinkle var(--d,3s) ease-in-out infinite; animation-delay: var(--dl,0s);
    }
    @keyframes twinkle {
      0%,100% { opacity:.12; transform:scale(.85); }
      50%      { opacity:.95; transform:scale(1.1); }
    }

    /* =====================================================
       CITY SILHOUETTE — unchanged
    ===================================================== */
    .city-bg {
      position: absolute; bottom: 108px; left: 0; right: 0; z-index: 2; height: 170px;
      display: flex; align-items: flex-end; justify-content: center; gap: 3px;
      opacity: .24; pointer-events: none;
    }
    .cb { flex-shrink: 0; background: linear-gradient(180deg, #1a183a, #0d0b1a); border-top: 1px solid rgba(124,58,237,.18); }

    /* =====================================================
       GROUND — unchanged
    ===================================================== */
    .ground {
      position: absolute; bottom: 0; left: 0; right: 0; height: 108px; z-index: 12;
      background: linear-gradient(180deg, #141228, #0a0916);
      border-top: 1px solid rgba(124,58,237,.12);
    }
    .road {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 160px; height: 108px; background: #0f0e1c;
      border-left: 1px solid rgba(124,58,237,.10); border-right: 1px solid rgba(124,58,237,.10);
    }
    .road-dashes { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 9px; }
    .rd { width: 5px; height: 16px; background: rgba(245,158,11,.32); border-radius: 1px; }
    .pavement { position: absolute; bottom: 0; height: 108px; width: calc(50% - 80px); background: linear-gradient(180deg, #111028, #09080f); }
    .pavement.left  { left: 0; }
    .pavement.right { right: 0; }

    /* =====================================================
       SCROLL HUD — unchanged
    ===================================================== */
    .scroll-hud {
      position: absolute; top: 28px; right: 32px; z-index: 50;
      display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
      opacity: 0; transition: opacity .4s; pointer-events: none;
    }
    .scroll-hud.visible { opacity: 1; }
    .hud-label { font-family: var(--font-mono); font-size: .58rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }
    .hud-value { font-family: var(--font-display); font-size: 2rem; letter-spacing: 3px; color: var(--gold); line-height: 1; }
    .hud-bar   { width: 80px; height: 2px; background: rgba(245,158,11,.15); position: relative; overflow: hidden; }
    .hud-bar-fill { position: absolute; left: 0; top: 0; bottom: 0; width: 0%; background: var(--gold); transition: width .1s linear; }

    /* =====================================================
       SCROLL HINT — unchanged
    ===================================================== */
    .scroll-hint {
      position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%);
      z-index: 30; display: flex; flex-direction: column; align-items: center; gap: 8px;
      opacity: 1; transition: opacity .6s ease; pointer-events: none;
    }
    .scroll-hint.hide { opacity: 0; }
    .sh-label  { font-family: var(--font-mono); font-size: .58rem; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; }
    .sh-arrow  { width: 1px; height: 36px; background: linear-gradient(180deg, transparent, var(--accent)); animation: pulse-line 1.6s ease-in-out infinite; }
    @keyframes pulse-line { 0%,100%{opacity:.25;transform:scaleY(.75);} 50%{opacity:1;transform:scaleY(1);} }
    .sh-chevron { width:10px;height:10px;border-right:1.5px solid var(--accent);border-bottom:1.5px solid var(--accent);transform:rotate(45deg) translateY(-4px);animation:bounce-chevron 1.6s ease-in-out infinite; }
    @keyframes bounce-chevron { 0%,100%{transform:rotate(45deg) translateY(-4px);opacity:.4;} 50%{transform:rotate(45deg) translateY(2px);opacity:1;} }

    /* =====================================================
       3D SCENE — unchanged from Stage 02
    ===================================================== */
    .scene-3d {
      position: absolute; bottom: 108px; left: 50%; transform: translateX(-50%);
      width: 380px; height: 540px;
      perspective: 900px; perspective-origin: 50% 120%;
      z-index: 8;
    }
    .building {
      position: absolute; bottom: 0; left: 50%;
      transform: translateX(-50%) scale(0.28);
      transform-origin: bottom center;
      transform-style: preserve-3d;
      width: 340px;
    }
    .blk {
      position: relative; width: 100%; opacity: 0;
      transform:
        translateX(var(--tx,0px)) translateY(var(--ty,0px))
        translateZ(var(--tz,0px)) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg));
      transition: opacity .95s cubic-bezier(0.22,1,0.36,1), transform .95s cubic-bezier(0.22,1,0.36,1);
    }
    .blk.vis { opacity:1; transform:translateX(0) translateY(0) translateZ(0) rotateX(0deg) rotateY(0deg); }
    .b-antenna { width:3px;height:32px;margin:0 auto;background:linear-gradient(180deg,rgba(245,158,11,.9),rgba(124,58,237,.3));position:relative; }
    .b-antenna::after { content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 18px 6px rgba(245,158,11,.8);animation:blink-tip 1.5s ease-in-out infinite; }
    @keyframes blink-tip { 0%,100%{opacity:1;box-shadow:0 0 18px 6px rgba(245,158,11,.8);}50%{opacity:.1;box-shadow:0 0 4px 1px rgba(245,158,11,.2);} }
    .b-roof-tri { height:0;width:0;margin:0 auto;border-left:90px solid transparent;border-right:90px solid transparent;border-bottom:38px solid #1e1c42;position:relative; }
    .b-roof-tri::after { content:'';position:absolute;bottom:-38px;left:-90px;right:-90px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--gold),var(--accent),transparent);opacity:.75; }
    .b-penthouse { height:50px;width:216px;margin:0 auto;background:linear-gradient(180deg,#1c1a3e,#141230);border-top:2px solid var(--accent);border-left:1px solid rgba(124,58,237,.3);border-right:1px solid rgba(124,58,237,.3);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden; }
    .b-penthouse::before { content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(124,58,237,.05) 3px,rgba(124,58,237,.05) 4px); }
    .b-penthouse-name { font-family:var(--font-display);font-size:.68rem;letter-spacing:2.5px;line-height:1.3;color:var(--gold);text-shadow:0 0 14px rgba(245,158,11,.6);text-align:center;z-index:1;position:relative; }
    .b-floor { height:60px;width:100%;background:linear-gradient(180deg,#111028,#0d0c22);border:1px solid rgba(124,58,237,.14);border-bottom:none;display:grid;grid-template-columns:repeat(8,1fr);gap:4px;padding:8px 10px;position:relative; }
    .b-floor::before { content:attr(data-label);position:absolute;left:-38px;top:50%;transform:translateY(-50%);font-family:var(--font-mono);font-size:.36rem;letter-spacing:2px;color:rgba(124,58,237,.32);writing-mode:vertical-rl;rotate:180deg; }
    .b-wings { display:flex;gap:4px;width:100%; }
    .b-wing { flex:1;height:54px;background:linear-gradient(180deg,#0f0e24,#0b0a1a);border:1px solid rgba(124,58,237,.12);border-bottom:none;display:grid;grid-template-columns:repeat(4,1fr);gap:3px;padding:6px; }
    .b-wing-center { width:216px;height:54px;background:linear-gradient(180deg,#111028,#0d0c22);border:1px solid rgba(124,58,237,.18);border-bottom:none;display:grid;grid-template-columns:repeat(5,1fr);gap:3px;padding:6px; }
    .win { background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.16);border-radius:1px;transition:background .4s,border-color .4s,opacity .15s; }
    .win.l1 { background:rgba(245,158,11,.30);border-color:rgba(245,158,11,.55);box-shadow:0 0 5px 1px rgba(245,158,11,.15) inset; }
    .win.l2 { background:rgba(124,58,237,.38);border-color:var(--accent);box-shadow:0 0 5px 1px rgba(124,58,237,.22) inset; }
    .win.l3 { background:rgba(6,182,212,.28);border-color:var(--cyan);box-shadow:0 0 5px 1px rgba(6,182,212,.18) inset; }
    .b-lobby { height:78px;width:100%;background:linear-gradient(180deg,#0d0c22,#07060e);border:1px solid rgba(124,58,237,.28);border-top:none;display:flex;align-items:flex-end;justify-content:center;position:relative;overflow:hidden; }
    .b-lobby::before { content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:130px;height:30px;background:radial-gradient(ellipse at 50% 100%,rgba(124,58,237,.4),transparent 70%); }
    .door-wrap { position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:124px;height:74px;display:flex;overflow:hidden; }
    .door-panel { flex:1;height:100%;background:linear-gradient(180deg,rgba(124,58,237,.22),rgba(124,58,237,.06));border-top:1px solid rgba(124,58,237,.5);position:relative;transition:transform .85s cubic-bezier(0.22,1,0.36,1); }
    .door-panel.left  { border-right:1px solid rgba(124,58,237,.3); }
    .door-panel.right { border-left:1px solid rgba(124,58,237,.3); }
    .door-panel.left::after,.door-panel.right::after { content:'';position:absolute;top:50%;width:5px;height:5px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px 2px rgba(245,158,11,.6);transform:translateY(-50%); }
    .door-panel.left::after  { right:5px; }
    .door-panel.right::after { left:5px; }
    .door-panel.left.open  { transform:translateX(-100%); }
    .door-panel.right.open { transform:translateX(100%); }
    .welcome-text { position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:124px;height:74px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:.85rem;letter-spacing:5px;color:var(--gold);text-shadow:0 0 22px rgba(245,158,11,.9),0 0 8px rgba(245,158,11,.5);opacity:0;transition:opacity .7s ease .35s;pointer-events:none; }
    .welcome-text.show { opacity:1; }
    .ground-glow { position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:140px;height:20px;background:radial-gradient(ellipse at 50% 100%,rgba(124,58,237,.5),transparent 70%);opacity:0;transition:opacity .8s ease;pointer-events:none; }
    .ground-glow.show { opacity:1; }
    .entrance-glow { position:absolute;bottom:108px;left:50%;transform:translateX(-50%);z-index:13;width:110px;height:18px;background:radial-gradient(ellipse at 50% 0%,rgba(124,58,237,.55),transparent 70%);opacity:0;transition:opacity .5s ease;pointer-events:none; }
    .b-sill { height:8px;width:148px;margin:0 auto;background:linear-gradient(90deg,rgba(124,58,237,0),rgba(124,58,237,.45),rgba(245,158,11,.45),rgba(124,58,237,.45),rgba(124,58,237,0));box-shadow:0 0 14px 3px rgba(124,58,237,.3); }

    /* =====================================================
       ★ NEW — STAGE 03: CHARACTER
    ===================================================== */

    /*
      #character sits on the road surface (z-index 15 = above ground z:12).
      JS drives its left position and transform: scale().
      The entire element is a flex column: shadow → legs → body → head.
      We render bottom-up so the shadow is at the bottom naturally.
    */
    #character {
      position: absolute;
      bottom: 108px;          /* sits exactly on the ground surface */
      left: 0;                /* JS sets this each frame */
      z-index: 15;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform-origin: bottom center;
      pointer-events: none;
      transition: opacity .5s ease;
    }

    /* ── Head ── */
    .char-head {
      width: 18px;
      height: 19px;
      background: #e8c49a;            /* skin tone */
      border-radius: 50% 50% 42% 42%;
      position: relative;
      z-index: 2;
      flex-shrink: 0;
    }
    /* hair */
    .char-head::before {
      content: '';
      position: absolute;
      top: -8px; left: -3px;
      width: 24px; height: 13px;
      background: #1a0f06;
      border-radius: 50% 50% 0 0;
    }
    /* ear dot */
    .char-head::after {
      content: '';
      position: absolute;
      top: 6px; right: -3px;
      width: 4px; height: 5px;
      background: #d4aa82;
      border-radius: 50%;
    }

    /* ── Body / suit ── */
    .char-body {
      width: 20px; height: 26px;
      background: linear-gradient(180deg, #1e2a4a, #162038);
      border-radius: 3px 3px 0 0;
      margin-top: -1px;
      position: relative;
      flex-shrink: 0;
      animation: char-bob 0s linear infinite paused;
    }
    /* shirt collar/tie detail */
    .char-body::before {
      content: '';
      position: absolute;
      top: 2px; left: 50%; transform: translateX(-50%);
      width: 6px; height: 10px;
      background: #ffffff22;
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    }
    /* briefcase */
    .char-body::after {
      content: '';
      position: absolute;
      bottom: 2px; right: -9px;
      width: 8px; height: 7px;
      background: #2a1a08;
      border: 1px solid rgba(245,158,11,.45);
      border-radius: 1px;
    }

    @keyframes char-bob {
      0%,100% { transform: translateY(0px);   }
      50%      { transform: translateY(-1.5px); }
    }

    /* ── Legs ── */
    .char-legs {
      display: flex;
      gap: 3px;
      flex-shrink: 0;
    }

    .char-leg {
      width: 8px; height: 16px;
      background: #111830;
      border-radius: 0 0 3px 3px;
      transform-origin: top center;
      position: relative;
    }
    /* shoe at bottom of each leg */
    .char-leg::after {
      content: '';
      position: absolute;
      bottom: -3px; left: -1px;
      width: 10px; height: 4px;
      background: #0a0a12;
      border-radius: 0 2px 2px 0;
    }

    /*
      Walking animations — left and right legs swing in opposite phase.
      Applied when JS adds class .walking to #character.
    */
    .walking .char-leg.left  { animation: swing-left  .38s ease-in-out infinite; }
    .walking .char-leg.right { animation: swing-right .38s ease-in-out infinite; }
    .walking .char-body      { animation: char-bob    .38s ease-in-out infinite; }

    @keyframes swing-left {
      0%   { transform: rotate(-18deg); }
      50%  { transform: rotate( 18deg); }
      100% { transform: rotate(-18deg); }
    }
    @keyframes swing-right {
      0%   { transform: rotate( 18deg); }
      50%  { transform: rotate(-18deg); }
      100% { transform: rotate( 18deg); }
    }

    /* ── Shadow ── */
    .char-shadow {
      width: 22px; height: 6px;
      background: rgba(0,0,0,.55);
      border-radius: 50%;
      margin-top: 2px;
      /* JS scales width to fake shadow stretching when far away */
      transform-origin: center;
      flex-shrink: 0;
    }

    /* ── Footstep canvas (dust puffs) ── */
    #footCanvas {
      position: absolute;
      bottom: 108px;
      left: 0; right: 0;
      height: 40px;
      z-index: 14;
      pointer-events: none;
    }

    /* ── Distance tag above character ── */
    .char-dist-tag {
      position: absolute;
      top: -22px; left: 50%; transform: translateX(-50%);
      font-family: var(--font-mono);
      font-size: .44rem; letter-spacing: 2px;
      color: rgba(200,180,255,.5);
      white-space: nowrap;
      pointer-events: none;
    }

  </style>
</head>
<body>

  <div id="scene">
    <div class="sticky" id="sticky">

      <div class="sky" id="sky"></div>
      <div class="stars-wrap" id="starsWrap"></div>
      <div class="city-bg" id="cityBg"></div>

      <!-- 3D Building — unchanged from Stage 02 -->
      <div class="scene-3d" id="scene3d">
        <div class="building" id="building">
          <div class="blk" id="blk0" style="--tx:0px;--ty:0px;--tz:-500px;--rx:0deg;--ry:0deg;"><div class="b-antenna"></div></div>
          <div class="blk" id="blk1" style="--tx:0px;--ty:-320px;--tz:0px;--rx:0deg;--ry:0deg;"><div class="b-roof-tri"></div></div>

            <div class="b-penthouse"><div class="b-penthouse-name">C. SREE HARSHITH REDDY'S<br>EMPIRE</div></div>
          </div>
          <div class="blk" id="blk3" style="--tx:-420px;--ty:0px;--tz:0px;--rx:0deg;--ry:-28deg;">
            <div class="b-floor" data-label="FLOOR 04">
              <div class="win l2"></div><div class="win"></div><div class="win l1"></div><div class="win l2"></div>
              <div class="win"></div><div class="win l1"></div><div class="win"></div><div class="win l2"></div>
            </div>
          </div>
          <div class="blk" id="blk4" style="--tx:420px;--ty:0px;--tz:0px;--rx:0deg;--ry:28deg;">
            <div class="b-floor" data-label="FLOOR 03">
              <div class="win"></div><div class="win l1"></div><div class="win l3"></div><div class="win l1"></div>
              <div class="win l2"></div><div class="win"></div><div class="win l1"></div><div class="win"></div>
            </div>
          </div>
          <div class="blk" id="blk5" style="--tx:0px;--ty:0px;--tz:-440px;--rx:22deg;--ry:0deg;">
            <div class="b-floor" data-label="FLOOR 02">
              <div class="win l1"></div><div class="win l2"></div><div class="win"></div><div class="win l1"></div>
              <div class="win"></div><div class="win l3"></div><div class="win l2"></div><div class="win l1"></div>

          <div class="blk" id="blk6" style="--tx:0px;--ty:0px;--tz:0px;--rx:0deg;--ry:0deg;">
            <div class="b-wings">
              <div class="b-wing" id="wingL">
                <div class="win"></div><div class="win l1"></div><div class="win l2"></div><div class="win"></div>
                <div class="win l1"></div><div class="win"></div><div class="win l2"></div><div class="win l1"></div>
              </div>
              <div class="b-wing-center">
                <div class="win l2"></div><div class="win l1"></div><div class="win"></div><div class="win l1"></div><div class="win l3"></div>
                <div class="win"></div><div class="win l2"></div><div class="win l1"></div><div class="win"></div><div class="win l2"></div>
              </div>
              <div class="b-wing" id="wingR">
                <div class="win l2"></div><div class="win"></div><div class="win l1"></div><div class="win l2"></div>
                <div class="win l1"></div><div class="win l3"></div><div class="win"></div><div class="win l1"></div>
              </div>
            </div>
          </div>
          <div class="blk" id="blk7" style="--tx:0px;--ty:0px;--tz:460px;--rx:-20deg;--ry:0deg;">
            <div class="b-floor" data-label="FLOOR 01">
              <div class="win l1"></div><div class="win"></div><div class="win l2"></div><div class="win l1"></div>
              <div class="win l3"></div><div class="win l1"></div><div class="win"></div><div class="win l2"></div>
            </div>
          </div>
          <div class="blk" id="blk8" style="--tx:0px;--ty:220px;--tz:0px;--rx:0deg;--ry:0deg;">
            <div class="b-lobby">
              <div class="ground-glow" id="groundGlow"></div>
              <div class="door-wrap">
                <div class="door-panel left"  id="doorL"></div>
                <div class="door-panel right" id="doorR"></div>
                <div class="welcome-text" id="welcomeText">WELCOME</div>
              </div>
            </div>
          </div>
          <div class="blk" id="blk9" style="--tx:0px;--ty:0px;--tz:-300px;--rx:0deg;--ry:0deg;">
            <div class="b-sill"></div>
          </div>
        </div>
      </div>

      <div class="entrance-glow" id="entranceGlow"></div>

      <!-- ============================================================
           ★ NEW — STAGE 03: CHARACTER
           Sits above the ground, walks along the road toward the door.
           JS controls: left offset, scale, opacity, .walking class.
      ============================================================ -->
      <div id="character">
        <!-- Distance indicator floating above head -->
        <div class="char-dist-tag" id="distTag">far away</div>
        <div class="char-head"></div>
        <div class="char-body"></div>
        <div class="char-legs">
          <div class="char-leg left"></div>
          <div class="char-leg right"></div>
        </div>
        <div class="char-shadow" id="charShadow"></div>
      </div>

      <!-- ★ NEW — footstep dust canvas -->
      <canvas id="footCanvas"></canvas>

      <div class="ground">
        <div class="pavement left"></div>
        <div class="road">
          <div class="road-dashes" id="roadDashes"></div>
        </div>
        <div class="pavement right"></div>
      </div>

      <div class="scroll-hud" id="scrollHud">
        <span class="hud-label">Scroll</span>
        <span class="hud-value" id="hudValue">0%</span>
        <div class="hud-bar"><div class="hud-bar-fill" id="hudFill"></div></div>
      </div>

      <div class="scroll-hint" id="scrollHint">
        <span class="sh-label">Scroll to enter</span>
        <div class="sh-arrow"></div>
        <div class="sh-chevron"></div>
      </div>

    </div>
  </div>


  <script>
    /* ==============================================================
       STAGE 03 JavaScript
       Stages 01 + 02 functions unchanged.
       New code clearly marked ★ NEW.
    ============================================================== */

    /* ── Stage 01–02: generators (unchanged) ── */
    function generateStars(count = 180) {
      const wrap = document.getElementById('starsWrap'), frag = document.createDocumentFragment();
      for (let i = 0; i < count; i++) {
        const s = document.createElement('div'); s.className = 'star';
        const sz = Math.random()*2+0.8, x = Math.random()*100, y = Math.random()*100;
        const d  = (Math.random()*3+2).toFixed(1), dl = (Math.random()*4).toFixed(1);
        s.style.cssText = `width:${sz}px;height:${sz}px;left:${x}%;top:${y}%;--d:${d}s;--dl:${dl}s;`;
        frag.appendChild(s);
      }
      wrap.appendChild(frag);
    }
    function generateCityBg() {
      const c = document.getElementById('cityBg'), f = document.createDocumentFragment();
      [[18,60],[28,95],[22,75],[35,130],[20,55],[30,110],[18,65],[42,155],
       [25,80],[30,100],[20,70],[36,125],[24,85],[28,95],[18,50],[40,140],
       [22,70],[26,90],[32,115],[20,60],[28,95],[18,55],[34,120],[22,75]]
      .forEach(([w,h]) => { const el=document.createElement('div'); el.className='cb'; el.style.cssText=`width:${w}px;height:${h}px;`; f.appendChild(el); });
      c.appendChild(f);
    }
    function generateRoadDashes(n=5) {
      const c=document.getElementById('roadDashes');
      for(let i=0;i<n;i++){const d=document.createElement('div');d.className='rd';c.appendChild(d);}
    }

    /* ── DOM refs ── */
    const scene       = document.getElementById('scene');
    const cityBg      = document.getElementById('cityBg');
    const scrollHud   = document.getElementById('scrollHud');
    const hudValue    = document.getElementById('hudValue');
    const hudFill     = document.getElementById('hudFill');
    const scrollHint  = document.getElementById('scrollHint');
    const building    = document.getElementById('building');
    const doorL       = document.getElementById('doorL');
    const doorR       = document.getElementById('doorR');
    const welcomeText = document.getElementById('welcomeText');
    const groundGlow  = document.getElementById('groundGlow');
    const entranceGlow= document.getElementById('entranceGlow');
    const blocks      = Array.from({length:10},(_,i)=>document.getElementById(`blk${i}`));

    /* ★ NEW — Stage 03 DOM refs */
    const character   = document.getElementById('character');
    const charShadow  = document.getElementById('charShadow');
    const distTag     = document.getElementById('distTag');
    const footCanvas  = document.getElementById('footCanvas');
    const footCtx     = footCanvas.getContext('2d');

    /* Stage 02 constants — unchanged */
    const THRESHOLDS = [0.38,0.34,0.30,0.25,0.22,0.18,0.15,0.12,0.07,0.04];
    const DELAYS     = [0,40,70,55,55,70,35,70,15,0];
    let doorsOpen    = false;

    /* ★ NEW — character state */
    let prevProgress     = 0;
    let isWalking        = false;
    let walkStopTimer    = null;
    let lastFootX        = -999;
    let footStep         = 0;    // alternates 0/1 for left/right foot

    /* ★ NEW — dust particles array */
    const dustParticles  = [];

    /* ============================================================
       SCROLL HANDLER — extended from Stage 02
    ============================================================ */
    function onScroll() {
      const sceneTop = scene.offsetTop;
      const progress = Math.max(0, Math.min(1,
        (window.scrollY - sceneTop) / (scene.offsetHeight - window.innerHeight)
      ));

      /* HUD */
      scrollHud.classList.toggle('visible', progress > 0.005);
      const pct = Math.round(progress * 100);
      hudValue.textContent = `${pct}%`;
      hudFill.style.width  = `${pct}%`;

      /* scroll hint */
      scrollHint.classList.toggle('hide', progress > 0.03);

      /* city silhouette */
      cityBg.style.opacity = Math.max(0, 0.24 - progress * 0.55).toFixed(3);

      /* sky bloom */
      const bl = Math.min(progress * 1.4, 1);
      document.getElementById('sky').style.background = `
        radial-gradient(ellipse 70% ${55+bl*20}% at 50% 0%,rgba(44,16,82,${(.85+bl*.15).toFixed(2)}) 0%,transparent 70%),
        linear-gradient(180deg,#0d0720 0%,#09061a 40%,#07060e 100%)`;

      /* Stage 02: reveal blocks */
      blocks.forEach((blk,i) => {
        if (progress >= THRESHOLDS[i]) {
          if (!blk.classList.contains('vis')) setTimeout(()=>blk.classList.add('vis'),DELAYS[i]);
        } else { blk.classList.remove('vis'); }
      });

      /* Stage 02: building zoom */
      const zp = Math.min(progress/0.82,1);
      const ez = zp*zp*(3-2*zp);
      building.style.transform = `translateX(-50%) scale(${(0.28+ez*0.97).toFixed(4)})`;

      /* Stage 02: entrance glow */
      const ga = Math.max(0,Math.min(1,(progress-0.38)/0.3));
      entranceGlow.style.opacity = ga.toFixed(3);

      /* Stage 02: sliding doors */
      if (progress >= 0.82 && !doorsOpen) {
        doorsOpen = true;
        doorL.classList.add('open'); doorR.classList.add('open');
        groundGlow.classList.add('show'); welcomeText.classList.add('show');
      } else if (progress < 0.78 && doorsOpen) {
        doorsOpen = false;
        doorL.classList.remove('open'); doorR.classList.remove('open');
        groundGlow.classList.remove('show'); welcomeText.classList.remove('show');
      }

      /* ★ NEW Stage 03: character movement ─────────────────────
         Journey:
           progress 0.00 → 0.04  character not yet visible
           progress 0.04 → 0.82  character walks from left to centre
           progress 0.82 → 0.92  character shrinks + fades into door
           progress 0.92+        character hidden
      ────────────────────────────────────────────────────────── */
      updateCharacter(progress);

      /* detect scrolling direction for walk animation */
      const scrolling = Math.abs(progress - prevProgress) > 0.0003;
      if (scrolling && progress > 0.04 && progress < 0.90) {
        startWalking();
      } else if (!scrolling) {
        scheduleStopWalking();
      }
      prevProgress = progress;
    }

    /* ★ NEW — position, scale, opacity of character per frame */
    function updateCharacter(progress) {
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      /* character journey: progress 0.04 (far left) → 0.82 (door centre)
         map that range to screen x: vw*0.05 → vw*0.50
         The character walks along the pavement/road toward the door. */
      const walkStart = 0.04;
      const walkEnd   = 0.82;
      const walkRange = walkEnd - walkStart;
      const walkT     = Math.max(0, Math.min(1, (progress - walkStart) / walkRange));

      /* smoothstep so it starts and ends gently */
      const walkEased = walkT * walkT * (3 - 2 * walkT);

      /* x position: starts at 5% of viewport, ends at 50% (door) */
      const startX = vw * 0.05;
      const endX   = vw * 0.50;
      const charX  = startX + walkEased * (endX - startX);

      /* scale: character starts tiny (far) and grows as it approaches
         maps 0.5 (tiny) → 1.0 (full size near door)
         This parallels the building zoom to reinforce depth. */
      const minScale  = 0.45;
      const maxScale  = 1.05;
      const charScale = minScale + walkEased * (maxScale - minScale);

      /* shadow width stretches when character is far (shallow angle sun),
         gets rounder as it gets close */
      const shadowW = 22 + (1 - walkEased) * 28;  /* 50px far → 22px near */
      charShadow.style.width  = `${shadowW}px`;

      /* opacity: invisible before walkStart, fade in quickly,
         then fade out as character enters door (progress 0.82–0.92) */
      let charOpacity = 1;
      if (progress < walkStart) charOpacity = 0;
      else if (progress < walkStart + 0.04) charOpacity = (progress - walkStart) / 0.04;
      else if (progress > 0.85) charOpacity = Math.max(0, 1 - (progress - 0.85) / 0.07);

      character.style.opacity   = charOpacity.toFixed(3);
      character.style.left      = `${charX}px`;
      character.style.transform = `translateX(-50%) scale(${charScale.toFixed(3)})`;

      /* distance tag */
      const distPct = Math.round(walkEased * 100);
      if (distPct < 95) {
        distTag.textContent = distPct < 10  ? 'far away'
                            : distPct < 40  ? 'approaching'
                            : distPct < 75  ? 'almost there'
                            : 'entering...';
      } else {
        distTag.textContent = '';
      }

      /* spawn dust particle every ~30px of horizontal movement */
      if (isWalking && charOpacity > 0.2) {
        if (Math.abs(charX - lastFootX) > 28) {
          spawnDust(charX, vh - 108);
          lastFootX = charX;
        }
      }
    }

    /* ★ NEW — toggle walking leg animation */
    function startWalking() {
      if (!isWalking) {
        isWalking = true;
        character.classList.add('walking');
      }
      if (walkStopTimer) { clearTimeout(walkStopTimer); walkStopTimer = null; }
    }

    function scheduleStopWalking() {
      if (walkStopTimer) return;
      walkStopTimer = setTimeout(() => {
        isWalking = false;
        character.classList.remove('walking');
        walkStopTimer = null;
      }, 180);
    }

    /* ★ NEW — dust particle system ─────────────────────────────
       Each puff is a small circle that floats upward and fades.
       Drawn on the #footCanvas every animation frame.
    ────────────────────────────────────────────────────────────*/
    function spawnDust(x, groundY) {
      const count = 3 + Math.floor(Math.random() * 3);
      for (let i = 0; i < count; i++) {
        dustParticles.push({
          x:    x + (Math.random() - 0.5) * 14,
          y:    groundY - 4,
          vx:   (Math.random() - 0.5) * 0.8,
          vy:   -(Math.random() * 0.8 + 0.2),
          r:    Math.random() * 3 + 1,
          life: 1.0,
          decay: 0.04 + Math.random() * 0.03,
        });
      }
    }

    function animateDust() {
      /* resize canvas to match viewport */
      if (footCanvas.width !== window.innerWidth) {
        footCanvas.width  = window.innerWidth;
        footCanvas.height = 40;
      }
      footCtx.clearRect(0, 0, footCanvas.width, footCanvas.height);

      for (let i = dustParticles.length - 1; i >= 0; i--) {
        const p = dustParticles[i];
        p.x    += p.vx;
        p.y    += p.vy;
        p.life -= p.decay;
        if (p.life <= 0) { dustParticles.splice(i, 1); continue; }

        footCtx.beginPath();
        footCtx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        footCtx.fillStyle = `rgba(124,58,237,${(p.life * 0.3).toFixed(2)})`;
        footCtx.fill();
      }
      requestAnimationFrame(animateDust);
    }

    /* ★ NEW — wing split observer (unchanged from Stage 02) */
    function initWingSplit() {
      const wL = document.getElementById('wingL');
      const wR = document.getElementById('wingR');
      wL.style.cssText += 'transform:translateX(-55px);transition:transform 1.1s cubic-bezier(0.22,1,0.36,1);';
      wR.style.cssText += 'transform:translateX(55px);transition:transform 1.1s cubic-bezier(0.22,1,0.36,1);';
      new MutationObserver(() => {
        const on = document.getElementById('blk6').classList.contains('vis');
        wL.style.transform = on ? 'translateX(0)' : 'translateX(-55px)';
        wR.style.transform = on ? 'translateX(0)' : 'translateX(55px)';
      }).observe(document.getElementById('blk6'),{attributes:true,attributeFilter:['class']});
    }

    /* ★ NEW — window flicker (unchanged from Stage 02) */
    function startWindowFlicker() {
      setInterval(() => {
        document.querySelectorAll('.win.l1,.win.l2,.win.l3').forEach(w => {
          if (Math.random()>0.91){w.style.opacity='0.22';setTimeout(()=>{w.style.opacity='';},100+Math.random()*200);}
        });
      }, 850);
    }

    /* ── INIT ── */
    function init() {
      generateStars(180);
      generateCityBg();
      generateRoadDashes(5);
      initWingSplit();

      /* size canvas */
      footCanvas.width  = window.innerWidth;
      footCanvas.height = 40;
      window.addEventListener('resize', () => {
        footCanvas.width  = window.innerWidth;
        footCanvas.height = 40;
      });

      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
      startWindowFlicker();
      animateDust(); /* start dust animation loop */
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>

</body>
</html>
